name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Install lcov
        run: sudo apt-get install -y lcov

      - name: Check test coverage
        run: |
          calc_path_coverage() {
            local path="$1"
            awk -v path="$path" '
              BEGIN { in_file = 0; total = 0; hit = 0 }
              /^SF:/ {
                sf = substr($0, 4)
                in_file = index(sf, path) > 0
                next
              }
              in_file && /^DA:/ {
                split(substr($0, 4), a, ",")
                total++
                if ((a[2] + 0) > 0) {
                  hit++
                }
              }
              END {
                if (total == 0) {
                  print "N/A"
                } else {
                  printf "%.1f", (hit * 100.0) / total
                }
              }
            ' coverage/lcov.info
          }

          # Overall coverage (informational)
          TOTAL_COVERAGE=$(lcov --summary coverage/lcov.info 2>&1 | awk '/lines\.+:/ {print $2; exit}' | sed 's/%//')
          echo "Overall Coverage: ${TOTAL_COVERAGE}%"

          # Auth coverage gate (required)
          AUTH_COVERAGE=$(calc_path_coverage "lib/features/auth/")
          if [ "$AUTH_COVERAGE" = "N/A" ]; then
            echo "❌ Could not calculate auth coverage from lcov report"
            echo "Available files in coverage:"
            awk '/^SF:/ {print substr($0, 4)}' coverage/lcov.info | grep "lib/features/auth" | head -10
            exit 1
          fi
          echo "Auth Coverage: ${AUTH_COVERAGE}%"

          if awk "BEGIN {exit !($AUTH_COVERAGE < 70)}"; then
            echo "❌ Auth coverage $AUTH_COVERAGE% is below 70% threshold"
            exit 1
          fi
          echo "✅ Auth coverage $AUTH_COVERAGE% meets 70% threshold"

          # Optional per-feature coverage (informational only, no fail)
          echo "Per-feature coverage summary:"
          FEATURE_PATHS=(
            "lib/features/agent"
            "lib/features/auth"
            "lib/features/buyer"
            "lib/features/documents"
            "lib/features/notifications"
            "lib/features/offer"
            "lib/features/payments"
            "lib/features/property"
            "lib/features/schedule"
          )

          for FEATURE in "${FEATURE_PATHS[@]}"; do
            if [ ! -d "$FEATURE" ]; then
              echo "- $FEATURE: N/A (path missing)"
              continue
            fi

            FEATURE_COVERAGE=$(calc_path_coverage "$FEATURE/")
            if [ "$FEATURE_COVERAGE" = "N/A" ]; then
              echo "- $FEATURE: N/A (no matching coverage data)"
            else
              echo "- $FEATURE: ${FEATURE_COVERAGE}%"
            fi
          done
