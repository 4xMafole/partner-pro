name: partner_pro
description: >
  PartnerPro — A modern real estate platform connecting Buyers and Agents.
  Property search, offer management, document signing, and agent CRM.
publish_to: "none"
version: 2.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── State Management ──
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  rxdart: ^0.28.0

  # ── Navigation ──
  go_router: ^14.8.1
  page_transition: ^2.1.0

  # ── Dependency Injection ──
  get_it: ^8.0.2
  injectable: ^2.5.0

  # ── Code Generation (annotations) ──
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # ── UI & Design ──
  flutter_screenutil: ^5.9.3
  google_fonts: ^6.2.1
  lucide_icons: ^0.257.0
  flutter_animate: ^4.5.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.2.0+3
  percent_indicator: ^4.2.3
  carousel_slider: ^5.0.0
  photo_view: ^0.15.0
  badges: ^3.1.2
  font_awesome_flutter: ^10.7.0
  auto_size_text: ^3.0.0
  aligned_tooltip: any

  # ── Firebase ──
  firebase_core: ^3.8.0
  cloud_firestore: ^5.6.5
  firebase_auth: ^5.6.0
  firebase_storage: ^12.4.0
  firebase_messaging: ^15.2.0
  cloud_functions: ^5.5.0
  firebase_app_check: ^0.3.3+1

  # ── Authentication ──
  google_sign_in: ^6.3.0
  sign_in_with_apple: ^7.0.1
  flutter_facebook_auth: any

  # ── Payments (RevenueCat) ──
  purchases_flutter: ^8.3.0

  # ── Maps & Location ──
  google_maps_flutter: ^2.12.0
  geolocator: ^13.0.0
  custom_info_window: ^1.0.1
  google_api_headers: ^4.2.1

  # ── Media & Files ──
  image_picker: ^1.1.2
  file_picker: ^10.1.0
  flutter_cache_manager: ^3.4.1

  # ── Documents ──
  syncfusion_flutter_pdfviewer: ^31.1.19
  signature: ^5.5.0
  flutter_markdown: ^0.7.6
  pdfx: ^2.6.0

  # ── WebView ──
  webview_flutter: ^4.10.0

  # ── Utilities ──
  intl: ^0.20.2
  equatable: ^2.0.7
  from_css_color: ^2.0.0
  json_path: ^0.7.4
  tutorial_coach_mark: ^1.3.3
  dartz: ^0.10.1
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^10.0.0
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  path_provider: ^2.1.4
  permission_handler: ^12.0.0
  device_info_plus: ^11.2.0
  package_info_plus: ^8.1.3
  http: ^1.4.0
  timeago: ^3.7.0
  mask_text_input_formatter: ^2.9.0
  table_calendar: ^3.2.0
  dropdown_button2: ^2.3.9
  csv: ^6.0.0
  easy_debounce: ^2.0.3
  flutter_spinkit: ^5.2.1
  currency_textfield: ^2.1.0
  keyboard_actions: ^4.2.0
  mime_type: ^1.0.0
  video_player: ^2.9.2
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.4
  injectable_generator: ^2.7.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

flutter_native_splash:
  color: "#F1F4F8"
  image: assets/images/app_launcher_icon.png
  android: true
  ios: true
  android_12:
    color: "#F1F4F8"
    image: assets/images/app_launcher_icon.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  web:
    generate: true
  image_path: "assets/images/app_launcher_icon.png"
  adaptive_icon_background: "#F1F4F8"
  adaptive_icon_foreground: "assets/images/adaptive_foreground_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/env/
